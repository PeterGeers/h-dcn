name: Deploy Backend
# Deploys to h-dcn stack in nonprofit account (506221081911)

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      stack_name:
        description: 'CloudFormation stack name (h-dcn for prod, h-dcn-test for test)'
        required: false
        default: ''
        type: string
      stage:
        description: 'Deployment stage (prod or test)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - test

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Backend (SAM)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # NOTE: CI ggshield scan removed 2026-06-23 to preserve API quota.
      # Secret scanning happens locally via Kiro preToolUse hook (with local fallback scanner).
      # Re-enable if multiple developers push without Kiro, or if quota is upgraded:
      #
      # - name: Secret scan (ggshield)
      #   uses: GitGuardian/ggshield-action@v1
      #   continue-on-error: true
      #   env:
      #     GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::506221081911:role/NonprofitDeployRole
          aws-region: eu-west-1

      - name: SAM Build
        working-directory: backend
        run: sam build

      - name: SAM Deploy
        working-directory: backend
        run: |
          STAGE="${{ inputs.stage || 'prod' }}"
          STACK="${{ inputs.stack_name }}"

          # Auto-select stack name based on stage if not explicitly provided
          if [ -z "$STACK" ]; then
            if [ "$STAGE" = "test" ]; then
              STACK="h-dcn-test"
            else
              STACK="h-dcn"
            fi
          fi

          if [ "$STAGE" = "test" ]; then
            sam deploy \
              --stack-name "$STACK" \
              --region eu-west-1 \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --resolve-s3 \
              --resolve-image-repos \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset \
              --parameter-overrides \
                Stage=test \
                Environment=prod \
                Table=Producten-Test \
                Region=eu-west-1 \
                MembersTable=Members-Test \
                PaymentsTable=Payments-Test \
                EventsTable=Events-Test \
                MembershipsTable=Memberships-Test \
                CartsTable=Carts-Test \
                OrdersTable=Orders-Test \
                CountersTable=Counters-Test \
                StockMovementsTableName=StockMovements-Test \
                DataBucket=h-dcn-data-test-506221081911 \
                ExistingUserPoolId=eu-west-1_fcUkvwjH5 \
                ExistingUserPoolClientId=6jhvk853b0lfg9q1m861qs0cug
          else
            sam deploy \
              --stack-name "$STACK" \
              --region eu-west-1 \
              --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
              --resolve-s3 \
              --resolve-image-repos \
              --no-confirm-changeset \
              --no-fail-on-empty-changeset \
              --parameter-overrides \
                Stage=prod \
                Environment=prod \
                Table=Producten \
                Region=eu-west-1 \
                MembersTable=Members \
                PaymentsTable=Payments \
                EventsTable=Events \
                MembershipsTable=Memberships \
                CartsTable=Carts \
                OrdersTable=Orders \
                ParametersTable=Parameters \
                DataBucket=h-dcn-data-506221081911 \
                ExistingUserPoolId=eu-west-1_fcUkvwjH5 \
                ExistingUserPoolClientId=6jhvk853b0lfg9q1m861qs0cug
          fi
