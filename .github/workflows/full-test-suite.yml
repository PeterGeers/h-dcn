name: Full Test Suite

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  actions: read

concurrency:
  group: nightly-tests
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (Full Suite)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements.txt

      - name: Run full test suite
        working-directory: backend
        continue-on-error: true
        run: |
          PASSED=0
          FAILED=0
          ERRORS=""
          TEST_FILES=$(find tests -name "test_*.py" | sort)
          TOTAL=$(echo "$TEST_FILES" | wc -l)
          echo "Found $TOTAL test files"
          i=0
          for f in $TEST_FILES; do
            i=$((i+1))
            echo "[$i/$TOTAL] Running: $f"
            if timeout 120 pytest "$f" --tb=short -q 2>&1 | tail -3; then
              PASSED=$((PASSED+1))
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "  ⏰ TIMEOUT: $f"
                ERRORS="$ERRORS\nTIMEOUT: $f"
              else
                echo "  ❌ FAILED: $f"
                ERRORS="$ERRORS\nFAILED: $f"
              fi
              FAILED=$((FAILED+1))
            fi
          done
          echo ""
          echo "=== Summary ==="
          echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
          if [ -n "$ERRORS" ]; then
            echo -e "\nIssues:$ERRORS"
          fi
          # Generate minimal JUnit XML for the report step
          echo '<?xml version="1.0" encoding="utf-8"?>' > test-results.xml
          echo "<testsuites tests=\"$TOTAL\" failures=\"$FAILED\" errors=\"0\">" >> test-results.xml
          echo "</testsuites>" >> test-results.xml
          echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED" > test-output.txt

      - name: Generate test report
        if: always()
        working-directory: backend
        run: |
          python -c "
          import xml.etree.ElementTree as ET
          import json
          from datetime import datetime

          tree = ET.parse('test-results.xml')
          root = tree.getroot()

          total = int(root.attrib.get('tests', '0'))
          failures = int(root.attrib.get('failures', '0'))
          errors = int(root.attrib.get('errors', '0'))
          skipped = int(root.attrib.get('skipped', '0'))
          passed = total - failures - errors - skipped

          # Collect failed tests
          failed_tests = []
          for testcase in root.iter('testcase'):
              failure = testcase.find('failure')
              error = testcase.find('error')
              if failure is not None or error is not None:
                  msg = ''
                  if failure is not None:
                      msg = failure.attrib.get('message', '')[:200]
                  elif error is not None:
                      msg = error.attrib.get('message', '')[:200]
                  failed_tests.append({
                      'classname': testcase.attrib.get('classname', ''),
                      'name': testcase.attrib.get('name', ''),
                      'file': testcase.attrib.get('file', ''),
                      'message': msg
                  })

          report = {
              'date': datetime.utcnow().isoformat() + 'Z',
              'summary': {
                  'total': total,
                  'passed': passed,
                  'failed': failures,
                  'errors': errors,
                  'skipped': skipped
              },
              'failed_tests': failed_tests
          }

          with open('test-report.json', 'w') as f:
              json.dump(report, f, indent=2)

          # Print summary
          print(f'Total: {total}, Passed: {passed}, Failed: {failures}, Errors: {errors}, Skipped: {skipped}')
          if failed_tests:
              print(f'\nFailed tests ({len(failed_tests)}):')
              for t in failed_tests:
                  print(f'  - {t[\"classname\"]}::{t[\"name\"]}')
                  if t['message']:
                      print(f'    {t[\"message\"][:100]}')
          "

      - name: Output to job summary
        if: always()
        working-directory: backend
        run: |
          if [ -f test-report.json ]; then
            echo "## 🧪 Nightly Backend Test Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          with open('test-report.json') as f:
              report = json.load(f)
          s = report['summary']
          print(f'**Date:** {report[\"date\"]}')
          print()
          print(f'| Metric | Count |')
          print(f'|--------|-------|')
          print(f'| Total  | {s[\"total\"]} |')
          print(f'| ✅ Passed | {s[\"passed\"]} |')
          print(f'| ❌ Failed | {s[\"failed\"]} |')
          print(f'| 💥 Errors | {s[\"errors\"]} |')
          print(f'| ⏭️ Skipped | {s[\"skipped\"]} |')
          print()
          if report['failed_tests']:
              print('### Failed Tests')
              print()
              for t in report['failed_tests']:
                  print(f'- \`{t[\"classname\"]}::{t[\"name\"]}\`')
                  if t['message']:
                      print(f'  > {t[\"message\"][:150]}')
          else:
              print('### ✅ All tests passed!')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: |
            backend/test-results.xml
            backend/test-report.json
            backend/test-output.txt
          retention-days: 30

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        continue-on-error: true
        run: |
          PASSED=0
          FAILED=0
          ERRORS=""
          TEST_FILES=$(find src -name "*.test.ts" -o -name "*.test.tsx" | sort)
          TOTAL=$(echo "$TEST_FILES" | wc -l)
          echo "Found $TOTAL test files"
          i=0
          for f in $TEST_FILES; do
            i=$((i+1))
            echo "[$i/$TOTAL] Running: $f"
            if timeout 60 npx react-scripts test --watchAll=false --ci --forceExit --testTimeout=10000 --testPathPattern="$(basename $f .test.tsx | sed 's/.test.ts$//')" 2>&1 | tail -5; then
              PASSED=$((PASSED+1))
            else
              EXIT_CODE=$?
              if [ $EXIT_CODE -eq 124 ]; then
                echo "  ⏰ TIMEOUT: $f (killed after 60s)"
                ERRORS="$ERRORS\nTIMEOUT: $f"
              else
                echo "  ❌ FAILED: $f"
              fi
              FAILED=$((FAILED+1))
            fi
          done
          echo ""
          echo "=== Summary ==="
          echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED"
          if [ -n "$ERRORS" ]; then
            echo -e "\nTimeouts:$ERRORS"
          fi
          echo "Total: $TOTAL | Passed: $PASSED | Failed: $FAILED" > test-output.txt

      - name: Generate test report
        if: always()
        working-directory: frontend
        run: |
          python3 -c "
          import json, re
          from datetime import datetime

          total = passed = failed = 0
          errors_list = []

          with open('test-output.txt') as f:
              content = f.read()

          # Parse 'Total: N | Passed: N | Failed: N'
          m = re.search(r'Total:\s*(\d+)\s*\|\s*Passed:\s*(\d+)\s*\|\s*Failed:\s*(\d+)', content)
          if m:
              total = int(m.group(1))
              passed = int(m.group(2))
              failed = int(m.group(3))

          # Collect TIMEOUT/FAILED lines
          for line in content.splitlines():
              if 'TIMEOUT:' in line or '❌ FAILED:' in line:
                  errors_list.append(line.strip())

          report = {
              'date': datetime.utcnow().isoformat() + 'Z',
              'summary': {
                  'total': total,
                  'passed': passed,
                  'failed': failed,
                  'errors': 0,
                  'skipped': 0
              },
              'failed_tests': errors_list
          }

          with open('test-report.json', 'w') as f:
              json.dump(report, f, indent=2)

          print(f'Total: {total}, Passed: {passed}, Failed: {failed}')
          "

      - name: Output to job summary
        if: always()
        working-directory: frontend
        run: |
          if [ -f test-report.json ]; then
            echo "## 🧪 Nightly Frontend Test Report" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('test-report.json') as f:
              report = json.load(f)
          s = report['summary']
          print(f'**Date:** {report[\"date\"]}')
          print()
          print(f'| Metric | Count |')
          print(f'|--------|-------|')
          print(f'| Total  | {s[\"total\"]} |')
          print(f'| ✅ Passed | {s[\"passed\"]} |')
          print(f'| ❌ Failed | {s[\"failed\"]} |')
          print(f'| 💥 Errors | {s[\"errors\"]} |')
          print(f'| ⏭️ Skipped | {s[\"skipped\"]} |')
          print()
          if report['failed_tests']:
              print('### Failed Tests')
              print()
              for t in report['failed_tests']:
                  print(f'- \`{t}\`')
          else:
              print('### ✅ All tests passed!')
          " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-report
          path: |
            frontend/test-output.txt
            frontend/test-report.json
          retention-days: 30
