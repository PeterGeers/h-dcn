name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Deployment stage (prod or test)'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - test

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (ggshield)
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Generate .env
        working-directory: frontend
        run: |
          STAGE="${{ inputs.stage || 'prod' }}"

          if [ "$STAGE" = "test" ]; then
            echo "REACT_APP_API_BASE_URL=https://k81706dxb0.execute-api.eu-west-1.amazonaws.com/prod" > .env
            echo "REACT_APP_DATA_BUCKET=h-dcn-data-test-506221081911" >> .env
          else
            echo "REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}" > .env
            echo "REACT_APP_DATA_BUCKET=h-dcn-data-506221081911" >> .env
          fi
          echo "REACT_APP_AWS_REGION=${{ vars.REACT_APP_AWS_REGION }}" >> .env
          echo "REACT_APP_S3_BUCKET=${{ vars.REACT_APP_S3_BUCKET }}" >> .env
          echo "REACT_APP_IMAGES_BUCKET=${{ vars.REACT_APP_IMAGES_BUCKET }}" >> .env
          echo "REACT_APP_USER_POOL_ID=${{ secrets.REACT_APP_USER_POOL_ID }}" >> .env
          echo "REACT_APP_USER_POOL_WEB_CLIENT_ID=${{ secrets.REACT_APP_USER_POOL_WEB_CLIENT_ID }}" >> .env
          echo "REACT_APP_COGNITO_DOMAIN=${{ vars.REACT_APP_COGNITO_DOMAIN }}" >> .env
          echo "REACT_APP_STRIPE_PUBLIC_KEY=${{ secrets.REACT_APP_STRIPE_PUBLIC_KEY }}" >> .env
          echo "REACT_APP_CACHE_VERSION=${{ vars.REACT_APP_CACHE_VERSION }}" >> .env
          echo "REACT_APP_LOGO_BUCKET_URL=${{ vars.REACT_APP_LOGO_BUCKET_URL }}" >> .env
          echo "REACT_APP_IMAGES_BASE_URL=${{ vars.REACT_APP_IMAGES_BASE_URL }}" >> .env
          cat .env

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          GENERATE_SOURCEMAP: 'false'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::506221081911:role/NonprofitDeployRole
          aws-region: eu-west-1

      - name: Deploy to S3
        run: |
          STAGE="${{ inputs.stage || 'prod' }}"
          if [ "$STAGE" = "test" ]; then
            aws s3 sync frontend/build/ s3://${{ vars.TEST_FRONTEND_BUCKET_NAME }}/ --delete
          else
            aws s3 sync frontend/build/ s3://${{ vars.FRONTEND_BUCKET_NAME }}/ --delete
          fi

      - name: Invalidate CloudFront
        if: ${{ inputs.stage != 'test' || vars.TEST_CLOUDFRONT_DISTRIBUTION_ID != 'PENDING_CERT_VALIDATION' }}
        run: |
          STAGE="${{ inputs.stage || 'prod' }}"
          if [ "$STAGE" = "test" ]; then
            DIST_ID="${{ vars.TEST_CLOUDFRONT_DISTRIBUTION_ID }}"
          else
            DIST_ID="${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}"
          fi
          aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/*"
