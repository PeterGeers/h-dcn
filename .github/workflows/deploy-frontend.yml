name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: frontend-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Secret scan (ggshield)
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Generate .env
        working-directory: frontend
        run: |
          cat <<EOF > .env
          REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_AWS_REGION=${{ vars.REACT_APP_AWS_REGION }}
          REACT_APP_S3_BUCKET=${{ vars.REACT_APP_S3_BUCKET }}
          REACT_APP_IMAGES_BUCKET=${{ vars.REACT_APP_IMAGES_BUCKET }}
          REACT_APP_USER_POOL_ID=${{ secrets.REACT_APP_USER_POOL_ID }}
          REACT_APP_USER_POOL_WEB_CLIENT_ID=${{ secrets.REACT_APP_USER_POOL_WEB_CLIENT_ID }}
          REACT_APP_STRIPE_PUBLIC_KEY=${{ secrets.REACT_APP_STRIPE_PUBLIC_KEY }}
          REACT_APP_CACHE_VERSION=${{ vars.REACT_APP_CACHE_VERSION }}
          REACT_APP_LOGO_BUCKET_URL=${{ vars.REACT_APP_LOGO_BUCKET_URL }}
          REACT_APP_IMAGES_BASE_URL=${{ vars.REACT_APP_IMAGES_BASE_URL }}
          EOF

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          GENERATE_SOURCEMAP: 'false'

      - name: Copy index.html to 404.html for SPA routing
        run: cp frontend/build/index.html frontend/build/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
