        AdminGetPayments:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/payments
            Method: get

  # --- Admin: Record Payment ---
  AdminRecordPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/admin_record_payment
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt AdminWebshopRole.Arn
      Environment:
        Variables:
          PAYMENTS_TABLE_NAME: !Ref PaymentsTable
          ORDERS_TABLE_NAME: !Ref OrdersTable
          COGNITO_USER_POOL_ID: !Ref ExistingUserPoolId
      Events:
        AdminRecordPayment:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/payments
            Method: post

  # --- Admin: Generate Report ---
  AdminGenerateReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/admin_generate_report
      Handler: app.lambda_handler
      Runtime: python3.11
      Timeout: 30
      MemorySize: 256
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt AdminWebshopRole.Arn
      Environment:
        Variables:
          ORDERS_TABLE_NAME: !Ref OrdersTable
          STOCK_MOVEMENTS_TABLE_NAME: !Ref StockMovementsTableName
          REPORTS_BUCKET_NAME: !Ref ReportsBucketName
          COGNITO_USER_POOL_ID: !Ref ExistingUserPoolId
      Events:
        AdminGenerateReport:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/reports/generate
            Method: post

  # --- Admin: Get Report ---
  AdminGetReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/admin_get_report
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt AdminWebshopRole.Arn
      Environment:
        Variables:
          REPORTS_BUCKET_NAME: !Ref ReportsBucketName
          COGNITO_USER_POOL_ID: !Ref ExistingUserPoolId
      Events:
        AdminGetReport:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/reports
            Method: get

  # --- Admin: Export Report ---
  AdminExportReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/admin_export_report
      Handler: app.lambda_handler
      Runtime: python3.11
      Timeout: 30
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt AdminWebshopRole.Arn
      Environment:
        Variables:
          ORDERS_TABLE_NAME: !Ref OrdersTable
          STOCK_MOVEMENTS_TABLE_NAME: !Ref StockMovementsTableName
          REPORTS_BUCKET_NAME: !Ref ReportsBucketName
          COGNITO_USER_POOL_ID: !Ref ExistingUserPoolId
      Events:
        AdminExportReport:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/reports/export
            Method: get

  # --- Admin: Event Claims Management (Closed Community Booking) ---
  AdminEventClaimsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/admin_event_claims
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Environment:
        Variables:
          EVENTS_TABLE_NAME: !Ref EventsTable
          MEMBERS_TABLE_NAME: !Ref MembersTable
          ORDERS_TABLE_NAME: !Ref OrdersTable
          REGISTRY_BUCKET_NAME: !Ref DataBucket
      Events:
        AdminEventClaimsGet:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/events/{event_id}/claims
            Method: get
        AdminEventClaimsPost:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/events/{event_id}/claims/{row_id}
            Method: post
        AdminEventClaimsDelete:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /admin/events/{event_id}/claims/{row_id}
            Method: delete

  # --- Send Delegate Invitation Email (Closed Community Booking) ---
  SendDelegateInvitationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/send_delegate_invitation
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Environment:
        Variables:
          ORDERS_TABLE_NAME: !Ref OrdersTable
          EVENTS_TABLE_NAME: !Ref EventsTable
          MEMBERS_TABLE_NAME: !Ref MembersTable
          EMAIL_TEMPLATES_BUCKET: !Ref EmailTemplatesBucket
          SENDER_EMAIL: !Ref OrganizationEmail
          PORTAL_BASE_URL: !FindInMap [StageConfig, !Ref Stage, OrganizationWebsite]
          ORGANIZATION_NAME: !Ref OrganizationName
          ORGANIZATION_WEBSITE: !FindInMap [StageConfig, !Ref Stage, OrganizationWebsite]
          ORGANIZATION_EMAIL: !Ref OrganizationEmail
          ORGANIZATION_SHORT_NAME: !Ref OrganizationShortName
      Events:
        SendDelegateInvitation:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /booking/{id}/invite-email
            Method: post

Outputs:
  ApiUrl:
    Description: "API Gateway invoke URL for this stage"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/"
    Export:
      Name: !Sub "${AWS::StackName}-ApiUrl"

  ApiBaseUrl:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${MyApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  
  CognitoUserPoolId:
    Description: "Cognito User Pool ID for H-DCN Authentication"
    Value: !Ref ExistingUserPoolId
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolId"
  
  CognitoUserPoolClientId:
    Description: "Cognito User Pool Client ID for H-DCN Web Application"
    Value: !Ref ExistingUserPoolClientId
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolClientId"
  
  CognitoUserPoolDomain:
    Description: "Cognito User Pool Domain for hosted UI"
    Value: "https://h-dcn-auth-new-344561557829.auth.eu-west-1.amazoncognito.com"
    Export:
      Name: !Sub "${AWS::StackName}-CognitoUserPoolDomain"

  # H-DCN Role Group Names (existing groups managed by webshop-backend stack)
  HDCNBasicMemberRole:
    Description: "Basic H-DCN member role group name (existing)"
    Value: "hdcnLeden"
    Export:
      Name: !Sub "${AWS::StackName}-HDCNLedenGroup"

  # Analytics Data Folder Structure
  AnalyticsDataInfo:
    Description: "Analytics data is stored in the DataBucket under analytics/ folder"
    Value: !Sub "s3://${DataBucket}/analytics/"
    Export:
      Name: !Sub "${AWS::StackName}-AnalyticsDataPath"
