AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  H-DCN Backend - Serverless API
# Deploy trigger: order handlers (CreateOrder, UpdateOrderItems, PayOrder)

# IMPORTANT: DynamoDB tables, Cognito User Pool, and S3 data buckets are managed
# OUTSIDE this template (created manually/via scripts). They are referenced via
# parameters only. DO NOT add them as CloudFormation resources without
# DeletionPolicy: Retain — a previous deploy deleted production data this way.


Parameters:
  Stage:
    Type: String
    Default: prod
    AllowedValues:
      - prod
      - test
    Description: "Deployment stage - determines CORS origins and environment-specific configuration"

  # EXISTING USER POOL - DO NOT CREATE NEW ONES!
  ExistingUserPoolId:
    Type: String
    Default: "eu-west-1_fcUkvwjH5"
    Description: "Existing Cognito User Pool ID (contains all users)"
  
  ExistingUserPoolClientId:
    Type: String
    Default: "6jhvk853b0lfg9q1m861qs0cug"
    Description: "Existing Cognito User Pool Client ID"
  Environment:
    Type: String
    Default: "dev"
    AllowedValues: ["dev", "test", "prod"]
    Description: "Environment name"
  Table:
    Type: String
    Default: Producten
  Region:
    Type: String
    Default: eu-west-1
  MembersTable:
    Type: String
    Default: Members
  PaymentsTable:
    Type: String
    Default: Payments
  EventsTable:
    Type: String
    Default: Events
  MembershipsTable:
    Type: String
    Default: Memberships
  CartsTable:
    Type: String
    Default: Carts
  OrdersTable:
    Type: String
    Default: Orders
  DataBucket:
    Type: String
    Default: h-dcn-data-506221081911
    Description: "S3 bucket for product images, logos, and other data assets"
  DefaultTempPassword:
    Type: String
    NoEcho: true
    Description: Default temporary password for new Cognito users
    Default: TempPass123!
  ForceUpdate:
    Type: String
    Default: "2025-12-28"
  
  JwtSecretBase:
    Type: String
    NoEcho: true
    Default: "h-dcn-event-session-secret-default"
    Description: "Base secret for signing event session tokens (JWT). Override via parameter overrides in deploy."

  # Email template customization parameters
  OrganizationName:
    Type: String
    Default: "Harley-Davidson Club Nederland"
    Description: "Organization name used in email templates"
  
  OrganizationWebsite:
    Type: String
    Default: "https://portal.h-dcn.nl"
    Description: "Organization website URL used in email templates"
  
  OrganizationEmail:
    Type: String
    Default: "webhulpje@h-dcn.nl"
    Description: "Organization contact email used in email templates"
  
  OrganizationShortName:
    Type: String
    Default: "H-DCN"
    Description: "Organization short name used in email templates"
  
  # Account recovery specific parameters
  SupportPhoneNumber:
    Type: String
    Default: "+31 (0)20 123 4567"
    Description: "Support phone number for account recovery assistance"
  
  RecoveryPageUrl:
    Type: String
    Default: "/recovery"
    Description: "Relative URL path for the account recovery page"
  
  HelpPageUrl:
    Type: String
    Default: "/help/passwordless-recovery"
    Description: "Relative URL path for the passwordless recovery help page"

  # Google Workspace SSO Configuration
  GoogleClientId:
    Type: String
    NoEcho: true
    Description: "Google OAuth 2.0 Client ID for Workspace SSO"
    Default: ""
  
  GoogleClientSecret:
    Type: String
    NoEcho: true
    Description: "Google OAuth 2.0 Client Secret for Workspace SSO"
    Default: ""

  # Mollie Configuration
  MollieApiKey:
    Type: String
    NoEcho: true
    Description: "Mollie API key for payment processing"
    Default: ""

  S3ReportsBucket:
    Type: String
    Default: "h-dcn-reports"
    Description: "S3 bucket name for report storage"

  StockMovementsTableName:
    Type: String
    Default: "StockMovements"
    Description: "DynamoDB table name for stock movements tracking"

  ReportsBucketName:
    Type: String
    Default: "h-dcn-webshop-reports"
    Description: "S3 bucket name for webshop admin report storage"

  CountersTable:
    Type: String
    Default: "Counters"
    Description: "DynamoDB table name for atomic counters (order numbers, invoice numbers). Managed externally."

  # Closed Community Booking
  SessionTokenSecret:
    Type: String
    NoEcho: true
    Description: "HMAC secret for signing event session tokens (verify-password flow)"
    Default: "h-dcn-event-session-default-secret"

Mappings:
  StageConfig:
    prod:
      CorsOrigin: "https://portal.h-dcn.nl"
      OrganizationWebsite: "https://portal.h-dcn.nl"
    test:
      CorsOrigin: "https://testportal.h-dcn.nl"
      OrganizationWebsite: "https://testportal.h-dcn.nl"

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Tracing: Active
    Architectures:
      - x86_64
    Environment:
      Variables:
        DYNAMODB_TABLE: !Ref Table
        REGION_NAME: !Ref Region
        PYTHONPATH: /opt/python
        CORS_ALLOWED_ORIGIN: !FindInMap [StageConfig, !Ref Stage, CorsOrigin]
  Api:
    TracingEnabled: True
    Cors:
      AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE,PATCH'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Enhanced-Groups,X-User-Email,x-requested-with,Accept-Language,x-session-token'"
      AllowOrigin: !Sub
        - "'${Origin}'"
        - Origin: !FindInMap [StageConfig, !Ref Stage, CorsOrigin]
      AllowCredentials: false

Resources:
  
  # Lambda Layer for Shared Authentication
  AuthLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: !Sub "${AWS::StackName}-auth-layer"
      Description: "Shared authentication utilities for H-DCN Lambda functions"
      ContentUri: layers/auth-layer/
      CompatibleRuntimes:
        - python3.11
      RetentionPolicy: Retain

  # S3 Bucket for Email Templates
  EmailTemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${AWS::StackName}-email-templates"
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Application
          Value: H-DCN
        - Key: Purpose
          Value: EmailTemplates

  # Using existing Cognito User Pool: eu-west-1_fcUkvwjH5 (contains all users)
  # User Pool and Client are referenced via ExistingUserPoolId and ExistingUserPoolClientId parameters

  # Using existing Cognito User Pool: eu-west-1_fcUkvwjH5 (contains all users and groups)
  # Groups and Identity Provider are managed by the 'webshop-backend' stack
  # This stack only references the existing User Pool and Client IDs

  # Lambda function for custom Cognito email messages
  CognitoCustomMessageFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/cognito_custom_message
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt CognitoLambdaRole.Arn
      Environment:
        Variables:
          ORGANIZATION_NAME: !Ref OrganizationName
          ORGANIZATION_WEBSITE: !Ref OrganizationWebsite
          ORGANIZATION_EMAIL: !Ref OrganizationEmail
          ORGANIZATION_SHORT_NAME: !Ref OrganizationShortName
          # Account recovery specific settings
          RECOVERY_URL: !Sub "${OrganizationWebsite}${RecoveryPageUrl}"
          HELP_URL: !Sub "${OrganizationWebsite}${HelpPageUrl}"
          SUPPORT_PHONE: !Ref SupportPhoneNumber
          # S3 Template Bucket
          EMAIL_TEMPLATES_BUCKET: !Ref EmailTemplatesBucket

  # Lambda function for pre-signup actions (links Google identity to existing native user)
  CognitoPreSignUpFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/cognito_pre_signup
      Handler: app.lambda_handler
      Runtime: python3.11
      Role: !GetAtt CognitoLambdaRole.Arn

  # Lambda function for post-confirmation actions
  CognitoPostConfirmationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/cognito_post_confirmation
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt CognitoLambdaRole.Arn
      Environment:
        Variables:
          DEFAULT_MEMBER_GROUP: hdcnLeden
          ORGANIZATION_NAME: !Ref OrganizationName
          ORGANIZATION_WEBSITE: !Ref OrganizationWebsite
          ORGANIZATION_EMAIL: !Ref OrganizationEmail
          ORGANIZATION_SHORT_NAME: !Ref OrganizationShortName
          MEMBERS_TABLE_NAME: !Ref MembersTable

  # Lambda function for post-authentication actions (handles Google SSO role assignment)
  CognitoPostAuthenticationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/cognito_post_authentication
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt CognitoLambdaRole.Arn
      Environment:
        Variables:
          DEFAULT_MEMBER_GROUP: hdcnLeden
          ORGANIZATION_NAME: !Ref OrganizationName
          ORGANIZATION_WEBSITE: !Ref OrganizationWebsite
          ORGANIZATION_EMAIL: !Ref OrganizationEmail
          ORGANIZATION_SHORT_NAME: !Ref OrganizationShortName
          MEMBERS_TABLE_NAME: !Ref MembersTable

  # IAM Role for Cognito Lambda triggers
  CognitoLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: CognitoLambdaAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminLinkProviderForUser
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminListGroupsForUser
                Resource: 
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/*"
        - PolicyName: S3EmailTemplatesAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: 
                  - !Sub "${EmailTemplatesBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: 
                  - !GetAtt EmailTemplatesBucket.Arn
        - PolicyName: SESEmailAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: DynamoDBMembersAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}/index/*"

  # Lambda permissions for Cognito triggers (using existing User Pool)
  CognitoCustomMessagePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CognitoCustomMessageFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"

  CognitoPostConfirmationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CognitoPostConfirmationFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"

  CognitoPostAuthenticationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CognitoPostAuthenticationFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"

  CognitoPreSignUpPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt CognitoPreSignUpFunction.Arn
      Action: lambda:InvokeFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"
  MyApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      OpenApiVersion: '3.0'
      BinaryMediaTypes:
        - application/pdf
      MethodSettings:
        - HttpMethod: POST
          ResourcePath: /events/{event_id}/verify-password
          ThrottlingRateLimit: 10
          ThrottlingBurstLimit: 10
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,DELETE,PATCH'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token,X-Enhanced-Groups,X-User-Email,x-requested-with,Accept-Language,x-session-token'"
        AllowOrigin: !Sub
          - "'${Origin}'"
          - Origin: !FindInMap [StageConfig, !Ref Stage, CorsOrigin]
        AllowCredentials: false

  # IAM Role for DynamoDB access (updated for GSI)
  DynamoDBRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${Table}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${PaymentsTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EventsTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembershipsTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CartsTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${OrdersTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${PaymentsTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${OrdersTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CartsTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EventsTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembershipsTable}/index/*"
        - PolicyName: CountersTableAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CountersTable}"
        - PolicyName: S3AnalyticsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:PutObjectAcl
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucket}/analytics/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucket}"
                Condition:
                  StringLike:
                    "s3:prefix": "analytics/*"
        - PolicyName: S3RegistryReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucket}/events/*"
        - PolicyName: CognitoReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminListGroupsForUser
                Resource:
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"
        - PolicyName: S3ReportsAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:DeleteObject
                Resource:
                  - !Sub "arn:aws:s3:::${S3ReportsBucket}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::${S3ReportsBucket}"
        - PolicyName: S3LogoUploadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource:
                  - "arn:aws:s3:::h-dcn-frontend-506221081911/assets/presmeet/logos/*"
        - PolicyName: SESEmailSendAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ses:SendEmail
                  - ses:SendRawEmail
                Resource: "*"
        - PolicyName: S3EmailTemplatesReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${EmailTemplatesBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource:
                  - !GetAtt EmailTemplatesBucket.Arn

  # IAM Role for Cognito Admin access
  CognitoAdminRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: CognitoAdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:ListUsers
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminUpdateUserAttributes
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminRemoveUserFromGroup
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:ListGroups
                  - cognito-idp:CreateGroup
                  - cognito-idp:DeleteGroup
                  - cognito-idp:ListUsersInGroup
                  - cognito-idp:DescribeUserPool
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminInitiateAuth
                  - cognito-idp:AdminRespondToAuthChallenge
                  - cognito-idp:AdminConfirmSignUp
                  - cognito-idp:SignUp
                  - cognito-idp:GetGroup
                  - cognito-idp:UpdateGroup
                Resource: 
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}/*"

  # IAM Role for Event Onboard Lambda (DynamoDB + Cognito Admin + S3 Registry)
  EventOnboardRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Scan
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EventsTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${EventsTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${MembersTable}/index/*"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${OrdersTable}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${OrdersTable}/index/*"
        - PolicyName: CognitoAdminAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cognito-idp:AdminCreateUser
                  - cognito-idp:AdminDeleteUser
                  - cognito-idp:AdminGetUser
                  - cognito-idp:AdminSetUserPassword
                  - cognito-idp:AdminAddUserToGroup
                  - cognito-idp:AdminListGroupsForUser
                  - cognito-idp:ListUsers
                Resource:
                  - !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${ExistingUserPoolId}"
        - PolicyName: S3RegistryReadAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "arn:aws:s3:::${DataBucket}/events/*"

  InsertProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/insert_product
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Events:
        InsertProduct:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /insert-product/
            Method: post
            
  DeleteProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/delete_product
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Events:
        DeletePost:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /delete-product/{id}
            Method: delete

  GetProductByIdFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/get_product_byid
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Events:
        GetPost:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /getproduct-byid/{id}
            Method: get

  # --- Webshop: Get Variants for a Product ---
  GetVariantsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/get_variants
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Environment:
        Variables:
          PRODUCTEN_TABLE_NAME: !Ref Table
      Events:
        GetVariants:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /products/{id}/variants
            Method: get

  scanProductFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/scan_product
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Events:
        ListProducts:
          Type: Api
          Properties:
            RestApiId: !Ref MyApi
            Path: /scan-product/
            Method: get



  # Member Management Functions
  CreateMemberFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: handler/create_member
      Handler: app.lambda_handler
      Runtime: python3.11
      Layers:
        - !Ref AuthLayer
      Role: !GetAtt DynamoDBRole.Arn
      Events:
        CreateMember:
