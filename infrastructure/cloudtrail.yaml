AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CloudTrail audit logging for the nonprofit account (506221081911).
  Enables logging of all management events including cross-account role assumptions.
  Requirements: 20.1, 20.2, 20.3

Parameters:
  RetentionDaysIA:
    Type: Number
    Default: 90
    Description: Days before transitioning logs to Infrequent Access storage class

  RetentionDaysExpiration:
    Type: Number
    Default: 365
    Description: Days before permanently deleting logs

  OrganizationName:
    Type: String
    Default: h-dcn
    Description: Organization/project name used in resource naming

Resources:
  # S3 Bucket for CloudTrail logs
  CloudTrailLogsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub '${OrganizationName}-cloudtrail-logs-${AWS::AccountId}'
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: !Ref RetentionDaysIA
            ExpirationInDays: !Ref RetentionDaysExpiration
      Tags:
        - Key: Project
          Value: h-dcn
        - Key: ManagedBy
          Value: cloudformation
        - Key: Purpose
          Value: cloudtrail-audit-logs

  # Bucket policy allowing CloudTrail to write logs
  CloudTrailLogsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudTrailLogsBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt CloudTrailLogsBucket.Arn
            Condition:
              StringEquals:
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${OrganizationName}-management-trail'
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub '${CloudTrailLogsBucket.Arn}/AWSLogs/${AWS::AccountId}/*'
            Condition:
              StringEquals:
                s3:x-amz-acl: bucket-owner-full-control
                aws:SourceArn: !Sub 'arn:aws:cloudtrail:${AWS::Region}:${AWS::AccountId}:trail/${OrganizationName}-management-trail'

  # CloudTrail trail for all management events (multi-region)
  ManagementTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: CloudTrailLogsBucketPolicy
    Properties:
      TrailName: !Sub '${OrganizationName}-management-trail'
      IsLogging: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EnableLogFileValidation: true
      S3BucketName: !Ref CloudTrailLogsBucket
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
      Tags:
        - Key: Project
          Value: h-dcn
        - Key: ManagedBy
          Value: cloudformation
        - Key: Purpose
          Value: audit-logging

Outputs:
  CloudTrailArn:
    Description: ARN of the CloudTrail trail
    Value: !GetAtt ManagementTrail.Arn
    Export:
      Name: !Sub '${AWS::StackName}-TrailArn'

  CloudTrailLogsBucketName:
    Description: Name of the S3 bucket storing CloudTrail logs
    Value: !Ref CloudTrailLogsBucket
    Export:
      Name: !Sub '${AWS::StackName}-LogsBucketName'

  CloudTrailLogsBucketArn:
    Description: ARN of the S3 bucket storing CloudTrail logs
    Value: !GetAtt CloudTrailLogsBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-LogsBucketArn'
