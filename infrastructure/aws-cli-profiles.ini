# AWS CLI Profile Configuration for h-dcn
# 
# Add these profiles to your ~/.aws/config file.
# Do NOT replace the entire file — append these sections to your existing config.
#
# Profiles:
#   personal        - Base profile for the personal account (344561557829)
#   nonprofit-dev   - Daily development in nonprofit account (MFA required)
#   nonprofit-deploy - CI/CD deployments to nonprofit account (no MFA)
#   nonprofit-admin - Emergency admin access to nonprofit account (MFA required)

[profile personal]
region = eu-west-1
output = json

[profile nonprofit-dev]
region = eu-west-1
role_arn = arn:aws:iam::506221081911:role/NonprofitDevRole
source_profile = personal
mfa_serial = arn:aws:iam::344561557829:mfa/webmaster

[profile nonprofit-deploy]
region = eu-west-1
role_arn = arn:aws:iam::506221081911:role/NonprofitDeployRole
source_profile = personal

[profile nonprofit-admin]
region = eu-west-1
role_arn = arn:aws:iam::506221081911:role/NonprofitAdminRole
source_profile = personal
mfa_serial = arn:aws:iam::344561557829:mfa/webmaster
