# GitGuardian configuration for H-DCN Dashboard
version: 2

# Secret scanning configuration
secret:
  # Show all policy breaks, not just secrets
  show_secrets: false

  # Ignore specific patterns that are false positives
  ignore_known_secrets: true

  # Ignored paths - excludes generated files, dependencies, and test files
  ignored_paths:
    # Translation/locale files (contain placeholder emails like "your@email.com" — not real secrets)
    - "**/locales/**"
    - "**/public/locales/**"
    # Lock files
    - "**/package-lock.json"
    - "**/yarn.lock"
    - "**/pnpm-lock.yaml"
    # Virtual environments
    - ".venv/**"
    - "**/.venv/**"
    # Node modules
    - "**/node_modules/**"
    # Test files
    - "test_*.py"
    - "test_*.html"
    - "**/tests/**"
    - "**/__tests__/**"
    # Utility scripts
    - "decode_*.py"
    - "trigger_*.py"

# Exit codes
exit_zero: false  # Return non-zero exit code when secrets are found
